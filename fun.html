<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness & Fun</title>
    <link rel="stylesheet" href="fun.css">
</head>
<body>

    <!-- Robot Pet Section -->
    <section class="robot-pet">
        <h3>Meet Your Robot Pet! 🐾</h3>
        <div class="pet-container">
            <img src="robp.jpeg" alt="Robot Pet" id="robotPet" />
            <button id="playButton">Play with Pet</button>
        </div>
    </section>

    <!-- Games Section -->
    <section class="games-section">
        <h3>Fun Games to De-stress! 🎮</h3>
        <div class="games-list">
            <button class="game-button" onclick="startMemoryGame()">Memory Game</button>
            <button class="game-button" onclick="startQuizGame()">Quiz Game</button>
        </div>

    </section>
    <script src="fun.js"></script>
</body>
</html>
